                <script>
                    function getStateCityDistrictHouseIdFromUrl() {
                        const url = new URL(window.location.href);
                        const path = url.pathname;

                        // 正则：支持 de / de-ch-at / us，结尾为 detail|form|result
                        const regex =
                            /^\/(?:(?:(?:de|de-ch-at)\/teach\/state\/([^/]+)\/([^/]+)\/([^/]+))|(?:us\/teach\/state\/([^/]+)\/([^/]+)\/([^/]+))|(?:(?:de|de-ch-at)\/([^/]+)\/([^/]+)\/([^/]+)))\/([^/]+)\/(detail|form|result)$/i;

                        const match = path.match(regex);

                        let state = null;
                        let city = null;
                        let district = null;
                        let houseId = null;
                        let action = null;

                        if (match) {
                            if (match[1]) {
                                // /de|de-ch-at/teach/state/:state/:city/:district/:houseId/(detail|form|result)
                                state = decodeURIComponent(match[1]);
                                city = decodeURIComponent(match[2]);
                                district = decodeURIComponent(match[3]);
                            } else if (match[4]) {
                                // /us/teach/state/:state/:city/:district/:houseId/(detail|form|result)
                                state = decodeURIComponent(match[4]);
                                city = decodeURIComponent(match[5]);
                                district = decodeURIComponent(match[6]);
                            } else if (match[7]) {
                                // /de|de-ch-at/:state/:city/:district/:houseId/(detail|form|result)
                                state = decodeURIComponent(match[7]);
                                city = decodeURIComponent(match[8]);
                                district = decodeURIComponent(match[9]);
                            }

                            houseId = decodeURIComponent(match[10]);
                            action = match[11].toLowerCase();
                        }

                        return { state, city, district, houseId, action };
                    }


                    function getLangFromPath() {
                        const pathSegments = window.location.pathname.split('/');
                        return pathSegments[1]; // 假设语言代码总是在第一个路径段

            // 监听滚动条的scroll事件，滚动时触发
            window.addEventListener('scroll', updatePageHeight);
            // 初始获取页面高度
            updatePageHeight();
        }
    })

    function updatePageHeight() {
        if (window.innerWidth > 500) {
            const div = document.getElementById('this_mt_right');
            const divheight = div.offsetHeight;
            let totalHeight = 0;
            const qtq = document.querySelector('.detail-left')
            try {
                totalHeight = qtq.offsetHeight
            } catch (ex) {
                totalHeight = 0
            }

            const pageHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
            document.getElementById('adv_sticky').style.height = (totalHeight - divheight) + 'px';
            //console.log('sticky高度:', document.getElementById('adv_sticky').offsetHeight);
        }
    }
</script>
