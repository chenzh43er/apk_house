# Cloudflare Pages 静态站点（Git 集成读取此文件）
# 账户：Ubeator@foxmail.com（Pages Git 部署不支持 account_id，由 Dashboard 项目绑定）
name = "apk-house"
pages_build_output_dir = "."
compatibility_date = "2026-03-17"

[[r2_buckets]]
binding = "HOUSEUS"
bucket_name = "houseus"

[[r2_buckets]]
binding = "HOUSEPIC"
bucket_name = "housepic"

[[r2_buckets]]
binding = "HOUSEAT"
bucket_name = "houseat"

[[r2_buckets]]
binding = "HOUSECH"
bucket_name = "housech"
