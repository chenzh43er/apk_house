<div id="region-selector" class="region-selector" role="radiogroup" aria-label="Select region">
  <style>
    .region-selector {
      display: flex !important;
      flex-direction: column !important;
      gap: 30px !important;
      padding: 10px !important;
      max-width: 300px !important;
      margin: auto !important;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial !important;
      justify-content: center;
      box-sizing: border-box;
    }

    .region-option {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px;
      background: #f6f8fa;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .region-option:hover {
      background: #eaeff5;
      transform: translateY(-1px);
    }

    .region-option:active {
      transform: scale(0.98);
    }

    .region-option .flag {
      width: 40px;
      height: 28px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
      background: #fff;
    }

    .region-option .label {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .region-option .country {
      font-weight: 600;
      font-size: 16px;
    }

    .region-option .subX {
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .region-selector {
        max-width: 100%;
      }
      .region-option {
        padding: 10px;
      }
    }
  </style>

  <!-- USA -->
  <div class="region-option" data-href="/us">
    <span class="flag">
      <svg viewBox="0 0 60 36" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect width="60" height="36" fill="#b22234"/>
        <g fill="#fff">
          <rect y="4" width="60" height="4"/>
          <rect y="12" width="60" height="4"/>
          <rect y="20" width="60" height="4"/>
          <rect y="28" width="60" height="4"/>
        </g>
        <rect width="26" height="14" fill="#3c3b6e"/>
        <g fill="#fff" transform="translate(2,2) scale(0.9)">
          <circle cx="3" cy="3" r="1"/>
          <circle cx="7" cy="3" r="1"/>
          <circle cx="11" cy="3" r="1"/>
          <circle cx="15" cy="3" r="1"/>
          <circle cx="3" cy="7" r="1"/>
          <circle cx="7" cy="7" r="1"/>
          <circle cx="11" cy="7" r="1"/>
          <circle cx="15" cy="7" r="1"/>
        </g>
      </svg>
    </span>
    <span class="label">
      <span class="country">United States</span>
      <span class="subX">en-US · USD</span>
    </span>
  </div>

  <!-- Germany -->
  <div class="region-option" data-href="./de">
    <span class="flag">
      <svg viewBox="0 0 5 3" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <rect width="5" height="1" y="0" fill="#000"/>
        <rect width="5" height="1" y="1" fill="#DD0000"/>
        <rect width="5" height="1" y="2" fill="#FFCE00"/>
      </svg>
    </span>
    <span class="label">
      <span class="country">Germany</span>
      <span class="subX">de-DE · EUR</span>
    </span>
  </div>

    </svg>
  </span>
