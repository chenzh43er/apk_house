# Cloudflare Worker：identityinsight.org 统一入口（路由 + R2 + Supabase）
# 账户：Ubeator@foxmail.com
name = "houseworker"
main = "worker/worker.js"
compatibility_date = "2026-03-17"
account_id = "892acd09257ee1251aca55e5a6f9946e"

# 禁用 esbuild 打包，直接上传源文件以保留注释（Dashboard 可见）
no_bundle = true

routes = [
  { pattern = "identityinsight.org/*", zone_name = "identityinsight.org" },
  { pattern = "www.identityinsight.org/*", zone_name = "identityinsight.org" },
]

[[r2_buckets]]
binding = "HOUSEUS"
bucket_name = "houseus"
remote = true

[[r2_buckets]]
binding = "HOUSEPIC"
bucket_name = "housepic"
remote = true

[[r2_buckets]]
binding = "HOUSEAT"
bucket_name = "houseat"
remote = true

[[r2_buckets]]
binding = "HOUSECH"
bucket_name = "housech"
remote = true

[observability]
enabled = true
